<!DOCTYPE html>
<!-- readalong: enabled | collapse: enabled -->
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kokoro</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div class="bg-blob bg-blob-3"></div>

    <div class="card">
        <h1>Kokoro TTS</h1>

        <div>
            <label for="text-input">Text</label>
            <div id="textarea-wrapper">
                <textarea id="text-input" rows="8" placeholder="Paste your text here..."></textarea>
                <button id="expand-btn">✎ Edit text</button>
            </div>
            <div id="readalong"></div>
            <div id="char-counter">0 / 20000 characters</div>
        </div>

        <div>
            <label for="voice-select">Voice</label>
            <select id="voice-select"></select>
        </div>

        <div>
            <label>Speed</label>
            <div class="slider-row">
                <input type="range" id="speed-slider" min="0.5" max="2.0" step="0.1" value="1.0" />
                <span id="speed-label">Speed: 1.0x</span>
            </div>
        </div>

        <div class="button-row">
            <button id="speak-btn">Speak</button>
            <button id="stop-btn">Stop</button>
        </div>

        <div id="status"></div>

        <div id="progress-section">
            <div class="progress-block">
                <div class="progress-label" id="gen-label">Generating: 0 of 0 chunks</div>
                <div class="progress-track">
                    <div id="gen-bar-fill"></div>
                </div>
            </div>
            <div class="progress-block">
                <div class="progress-label" id="play-label">Playing: 0:00 / 0:00</div>
                <div class="progress-track" id="play-track">
                    <div id="play-bar-fill"></div>
                </div>
            </div>
        </div>

        <div id="playback-controls">
            <button class="ctrl-btn" id="seek-back-btn">⏮ −10s</button>
            <button class="ctrl-btn" id="play-pause-btn">⏸</button>
            <button class="ctrl-btn" id="seek-fwd-btn">+10s ⏭</button>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
